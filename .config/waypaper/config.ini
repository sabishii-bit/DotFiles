[Settings]
language = en
folder = ~/Pictures/Wallpapers
monitors = All
	HDMI-A-1
	DP-2
wallpaper = ~/Pictures/Wallpapers/golden-forest-pixel-moewalls-com.mp4
	~/Pictures/Wallpapers/sunset-city-street-pixel-moewalls-com.mp4
	~/Pictures/Wallpapers/LinuxPowered.png
show_path_in_tooltip = True
backend = mpvpaper
fill = fill
sort = name
color = #ffffff
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = 
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = --loop
use_xdg_state = False
stylesheet = /home/lain/.config/waypaper/style.css

